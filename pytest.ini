[pytest]
testpaths = tests
markers =
    smoke: Quick smoke tests
    regression: Full regression suite
    filters: Filter functionality tests
    pagination: Pagination tests
    api: API validation tests
    negative: Negative/edge case tests
addopts =
    --alluredir=reports/allure-results
    -v
    --tb=short
log_cli = true
log_cli_level = INFO
